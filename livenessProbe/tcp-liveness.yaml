apiVersion: v1
kind: Pod
metadata:
  name: tcp-liveness
  labels:
    test: liveness
spec:
  containers:
    - name: nginx-cont
      image: nginx
      ports:
        - containerPort: 80
      livenessProbe:
        tcpSocket:
          port: 80
        initialDelaySeconds: 5
        timeoutSeconds: 15
        periodSeconds: 5

