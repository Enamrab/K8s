apiVersion: v1
kind: Pod
metadata:
  name: env-secret-pod
  labels:
    version: "0.1"
spec:
  containers:
    - name: cont1
      image: ubuntu:latest
      command:
        - /bin/bash
        - -c
        - |
          while true; do
            echo "Hi from Secret! injecting secret using env method";
            sleep 10;
          done
      env:
        - name: mysecret
          valueFrom:
            secretKeyRef:
              name: mysecret
              key: password.txt
        - name: myusersecret
          valueFrom:
            secretKeyRef:
              name: mysecret
              key: username.txt

