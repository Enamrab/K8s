apiVersion: v1
kind: Pod
metadata:
  name: app-pod
  labels:
    app: my-app
spec:
  # 1. Init Containers run first in sequence
  initContainers:
  - name: wait-for-database
    image: busybox:1.36
    command: ['sh', '-c', 'until nc -z db-service 5432; do echo waiting for database; sleep 2; done']
  
  # 2. Main Containers run only after initContainers exit with code 0
  containers:
  - name: main-web-app
    image: nginx:latest
    ports:
    - containerPort: 80

