apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: replica1
  labels:
    app: myapp
spec:
  replicas: 3
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      imagePullSecrets:
        - name: dockerhub-cred
      containers:
        - name: cont1
          image: n8nio/n8n

