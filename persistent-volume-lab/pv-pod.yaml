apiVersion: v1
kind: Pod
metadata:
  name: pv-pod2
spec:
  containers:
    - name: nginx-cont
      image: nginx
      ports:
        - containerPort: 80
      volumeMounts:
        - name: pv-storage
          mountPath: /usr/share/nginx/html
  volumes:
    - name: pv-storage
      persistentVolumeClaim:
        claimName: pv-claim
